name: Update & Deploy TDFdA

# Runs after each stage settles (and on demand), refreshes the data from
# letour.fr, recomputes the American standings, and deploys the dashboard to
# GitHub Pages. No secrets, no committing back — it builds and publishes.

on:
  schedule:
    # GitHub's scheduled runs are best-effort and unreliable: they've fired ~90 min
    # late and been dropped entirely on other days. Rather than trust a few precise
    # slots, we attempt every ~30 min across the whole results window (a stage
    # finishes ~15:15 UTC and settles by ~17:30). Runs are idempotent and
    # cancel-in-progress, so frequent attempts are cheap insurance, not waste:
    # even with big delays and random skips, one lands soon after results post.
    - cron: '7,37 15-21 * * *'   # :07 and :37 each hour, 15:07-21:37 UTC (17:07-23:37 CEST)
  workflow_dispatch: {}          # manual refresh anytime

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Fetch results + compute standings
        run: |
          python3 src/fetch.py
          python3 src/compute.py
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web
      - id: deploy
        uses: actions/deploy-pages@v4
